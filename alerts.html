<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts History - SafeGuardAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding-top: 80px; }
        .dashboard-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        
        .dash-nav { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .dash-nav a { padding: 0.5rem 1.5rem; border-radius: 20px; text-decoration: none; font-weight: 600; color: var(--text-secondary); transition: all 0.3s; }
        .dash-nav a.active { background: var(--primary-color); color: white; }
        .dash-nav a:hover:not(.active) { background: var(--bg-secondary); }

        .alerts-panel { background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color); overflow: hidden; }
        .alert-item { padding: 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: flex-start; }
        .alert-item:last-child { border-bottom: none; }
        .alert-item.unread { background: rgba(239, 68, 68, 0.05); }
        .alert-content h4 { margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .alert-content h4 i { color: #ef4444; }
        .alert-time { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
        
        .empty-state { padding: 3rem; text-align: center; color: var(--text-secondary); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; color: #10b981; opacity: 0.5; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-shield-heart"></i>
                <span>SafeGuard<span class="accent">AI</span></span>
            </a>
            <div class="nav-actions">
                <div style="display: flex; align-items: center; gap: 1rem; margin-right: 1rem;">
                    <span id="navUserName" style="font-weight: 600; font-size: 0.9rem;"></span>
                    <button class="btn btn-outline" id="navLogoutBtn" style="padding: 0.3rem 0.8rem; font-size: 0.8rem;">Logout</button>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dash-nav">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Overview</a>
            <a href="alerts.html" class="active"><i class="fas fa-bell"></i> Alerts History</a>
        </div>

        <div style="margin-bottom: 2rem;">
            <h2>Alerts History</h2>
            <p>Review past inactivity and verification alerts.</p>
        </div>

        <div class="alerts-panel" id="alertsList">
            <div class="empty-state">Loading alerts...</div>
        </div>
    </div>

    <script>
        const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:') ? 'http://localhost:5000/api' : 'https://ai-based-digital-proof-of-life-safety.onrender.com/api';
        const token = localStorage.getItem('safeguard_token');
        const userStr = localStorage.getItem('safeguard_user');
        
        if (!token) {
            window.location.href = 'index.html';
        }

        const user = JSON.parse(userStr);
        document.getElementById('navUserName').textContent = `👤 ${user.name}`;
        
        document.getElementById('navLogoutBtn').addEventListener('click', () => {
            localStorage.removeItem('safeguard_token');
            localStorage.removeItem('safeguard_user');
            window.location.href = 'index.html';
        });

        // Theme functionality
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('themeToggle').querySelector('i').className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        document.getElementById('themeToggle').addEventListener('click', () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeToggle').querySelector('i').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        });

        async function fetchAlerts() {
            try {
                const res = await fetch(`${API_BASE}/activity/alerts`, { headers: { 'Authorization': `Bearer ${token}` } });
                const alerts = await res.json();
                
                const list = document.getElementById('alertsList');
                list.innerHTML = '';
                
                if (alerts.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-check-circle"></i>
                            <h3>All Clear</h3>
                            <p>No alerts have been generated for you yet.</p>
                        </div>
                    `;
                    return;
                }

                alerts.forEach(alert => {
                    const item = document.createElement('div');
                    item.className = `alert-item ${!alert.isRead ? 'unread' : ''}`;
                    
                    item.innerHTML = `
                        <div class="alert-content">
                            <h4><i class="fas fa-exclamation-circle"></i> ${alert.type}</h4>
                            <p>${alert.message}</p>
                            <div class="alert-time">${new Date(alert.createdAt).toLocaleString()}</div>
                        </div>
                        ${!alert.isRead ? `<button class="btn btn-outline" style="font-size:0.8rem; padding:0.3rem 0.8rem;" onclick="markRead('${alert._id}')">Acknowledge</button>` : '<span style="color:#10b981;font-size:0.85rem;"><i class="fas fa-check"></i> Resolved</span>'}
                    `;
                    list.appendChild(item);
                });
            } catch (err) {
                document.getElementById('alertsList').innerHTML = `<div class="empty-state">Failed to load alerts.</div>`;
            }
        }

        async function markRead(id) {
            try {
                await fetch(`${API_BASE}/activity/alerts/${id}/read`, { 
                    method: 'PUT', 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                fetchAlerts();
            } catch (err) { console.error("Failed to mark read"); }
        }

        fetchAlerts();
        // Optional: polling
        setInterval(fetchAlerts, 15000);
    </script>
</body>
</html>
